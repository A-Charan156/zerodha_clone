<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Facts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #fact-container {
            margin: 20px auto;
            padding: 20px;
            max-width: 600px;
            min-height: 50px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <h1>Cat Facts</h1>
    <div id="fact-container"></div>
    <button id="get-fact-btn">Get Cat Fact</button>

    <script>
        const factContainer = document.getElementById('fact-container');
        const getFactBtn = document.getElementById('get-fact-btn');

        getFactBtn.addEventListener('click', () => {
            factContainer.innerText = 'Loading...';
            fetch('https://meowfacts.herokuapp.com/')
                .then(response => response.json())
                .then(data => {
                    factContainer.innerText = data.data[0];
                })
                .catch(error => {
                    console.error('Error fetching cat fact:', error);
                    factContainer.innerText = 'Failed to load a cat fact. Please try again.';
                });
        });
    </script>
</body>

</html>
